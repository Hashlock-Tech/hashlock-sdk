  """Day 5 Wave 5 — Ghost Auction Option B: broadcast of new blind orders.
  Returns NULL for the originator's own broadcast so creators don't see
  their own posts. Carries pseudonym (the standing pii-free alias),
  never the creator id.

  Note: `side` is String! (not the Side enum) because this type lives in
  SUBSCRIPTION_SDL — a subset parsed standalone for the graphql-ws server,
  which does not import the Side enum. The federated schema gets the
  enum-typed version via the resolver layer; clients see equivalent
  values either way."""
  type BlindOrderBroadcast {
    orderId: ID!
    pseudonym: String!
    baseToken: String!
    quoteToken: String!
    side: String!
    amount: String!
    minPrice: String
    maxPrice: String
    createdAt: String!
  }

  """
  User-scoped trade lifecycle event. Fan-out by user_id (initiator OR
  counterparty) so a single subscription per session covers every trade
  the user is a party to. `kind` discriminates the lifecycle stage so
  the bell can render distinct copy + deep-link routes.
  """
  type MyTradeUpdate {
    tradeId: ID!
    """One of: INITIATOR_LOCKED, BOTH_LOCKED, COMPLETED, REFUNDED, EXPIRED, CANCELLED"""
    kind: String!
    """Tier-2 status for richer UIs (e.g. CROSS_CHAIN_CLAIM_READY)."""
    status: String!
    role: String!
    baseToken: String
    quoteToken: String
    occurredAt: String!
  }

  """
  Instant Settlement Faz 1.6: a taker requested an instant fill on one of
  the subscriber's instant-fill quotes. User-scoped to the SOLVER (the
  quote's market maker) — the solver must now front the fill from its vault.
  """
  type InstantFillRequested {
    fillId: ID!
    quoteId: ID!
    rfqId: ID!
    """Always 'committed' at request time."""
    state: String!
    """Committed amount in the asset's smallest unit (decimal string)."""
    amountWei: String!
    createdAt: String!
  }

  """
  Instant-fill lifecycle: the solver marked one of the subscriber's requested
  fills as fronted — the taker's asset is on its way from the solver vault.
  User-scoped to the TAKER (the RFQ owner); mirror of InstantFillRequested
  with the parties swapped.
  """
  type InstantFillFronted {
    fillId: ID!
    quoteId: ID!
    rfqId: ID!
    """Trade materialised from the accepted quote (fronting requires the link)."""
    tradeId: ID
    """Always 'fronted' at publish time."""
    state: String!
    """Committed amount in the asset's smallest unit (decimal string)."""
    amountWei: String!
    """EVM tx hash of the solver vault's fronting transfer."""
    frontTxHash: String!
    frontedAt: String!
  }

  type Subscription {
    tradeUpdated(tradeId: ID!): TradeUpdate!
    htlcUpdated(tradeId: ID!): HTLCUpdate!
    """Real-time broadcast of new RFQs to opted-in users"""
    rfqCreated: RFQBroadcast
    """Live quote landed on the caller's RFQ. Authorized only for the RFQ owner."""
    quoteSubmitted(rfqId: ID!): QuoteSubmittedEvent!
    """Cross-page user-scoped fan-out: any quote on any of the caller's RFQs."""
    myRfqQuoteSubmitted: MyRfqQuoteNotification!
    """Real-time broadcast of new blind orders for the Ghost Auction terminal + MM bots."""
    blindOrderCreated: BlindOrderBroadcast
    """Cross-page user-scoped fan-out: any lifecycle event on any of the caller's trades."""
    myTradeUpdated: MyTradeUpdate!
    """Solver-scoped fan-out: a taker requested an instant fill on one of the caller's quotes."""
    instantFillRequested: InstantFillRequested!
    """Taker-scoped fan-out: a solver marked one of the caller's requested instant fills as fronted."""
    instantFillFronted: InstantFillFronted!
  }

  # ============================================================
  # Compute asset class (PR1 scaffolding — flag OFF)
  # ============================================================
  #
  # All types below land via the FEATURE_COMPUTE_TRADING-gated path.
  # PR1 does NOT wire them into any resolver, query, or mutation. They
  # appear in GraphQL introspection but no runtime path produces or
  # consumes them. PR2 adds createComputeCapacityRfq,
  # acceptComputeCapacityQuote, and the attestation-watcher chain-watcher;
  # that's when these types start being served.
  #
  # See CAYMAN-PR1-KICKOFF.md §4 + §6.2 for the upstream spec; the data
  # shape is non-negotiable, only the schema dialect adapts.

  enum InstrumentKind {
    TOKEN
    COMPUTE_CAPACITY
  }

  enum SettlementMode {
    HASHLOCK_HTLC                # existing token-for-token atomic swap
    COLLATERAL_BACKED_DELIVERY   # existing forward-contract path
    ATTESTATION_LOCK_PERFORMANCE # new — hashlock-compute settlement
  }

  enum AttestationState {
    MINTED
    LISTED
    SOLD
    ACTIVE
    SETTLED
    REFUNDED
  }

  enum ComputeType {
    GPU
    CPU
    TPU
  }

  enum DeliveryMethod {
    API_KEY
    SSH_ACCESS
    DOCKER_JOB_SUBMIT
    CUSTOM
  }

  enum MeasurementMode {
    MONITOR_COMMITTEE
    BUYER_SELF_REPORT
    NRAS_GPU_ATTESTED
    TDX_VM_ATTESTED
    ZK_OF_ATTESTATION
  }

  """
  Discriminated by 'kind'; both members share chainType + chainId for
  ergonomic shared-field reads across asset classes.
  """
  interface TradedInstrument {
    kind: InstrumentKind!
    chainType: String!
    chainId: String!
  }

  type TokenInstrument implements TradedInstrument {
    kind: InstrumentKind!
    chainType: String!
    chainId: String!
    symbol: String!
    """null for native gas tokens (ETH, BTC, SUI)"""
    contractAddress: String
    decimals: Int!
  }

  type ComputeCapacityInstrument implements TradedInstrument {
    kind: InstrumentKind!
    chainType: String!
    chainId: String!
    computeType: ComputeType!
    """Hardware identifier (e.g. 'H100', 'B200', 'Xeon-Platinum-8580')"""
    hardwareClass: String
    """ComputeSettlement deployment address on the named chain"""
    contractAddress: String!
    """ERC-1155 tokenId of the capacity batch (256-bit, stored as decimal string)"""
    tokenId: String!
    """unix seconds as bigint string"""
    periodStart: String!
    periodEnd: String!
    """USDC base units, decimal string"""
    unitNotional: String!
    attestationLockKeys: AttestationLockKeys!
    deliveryMethod: DeliveryMethod!
    """opaque method-specific payload (negotiated in chat)"""
    endpointSpec: String
    measurementMode: MeasurementMode!
  }

  type AttestationLockKeys {
    """0x-prefixed EVM address"""
    providerSigner: String!
    monitorSigners: [String!]!
    monitorThreshold: Int!
    """nullable until buy lands"""
    buyerSigner: String
  }

  type AttestationLeg {
    tradeId: ID!
    chainType: String!
    chainId: String
    """ComputeSettlement deployment address"""
    contractAddress: String!
    """ERC-1155 tokenId of the capacity batch (decimal string)"""
    tokenId: String!
    periodStart: String!
    periodEnd: String!
    """checkpoint sequence"""
    cpSeq: Int!
    state: AttestationState!
    cumUptimeBps: Int
    cumPerfBps: Int
    """65-byte hex when collected"""
    buyerSig: String
    providerSig: String
    monitorSigs: [String!]
    settleTxHash: String
    refundTxHash: String
    """EVM tx hash of the mint, filled by chain-watcher on TokenMinted observed"""
    mintTxHash: String
    """EVM tx hash of the buy, filled by chain-watcher on Bought observed"""
    boughtTxHash: String
    """EVM tx hash of ComputeSettlement.activate. NULL until chain-watcher observes Activated. PR2.3."""
    activatedTxHash: String
  }

