  """Bitcoin envelope returned by mcpBuild{Lock,Claim,Refund}Calldata when
  chainType='bitcoin'. Per .planning/MCP-BITCOIN-PLAN.md §3.1 the backend
  never sees the client UTXO set — it describes what the client must
  fund (lock) or spend (claim/refund). The agent uses bitcoinjs-lib (or
  equivalent) to assemble the actual signed PSBT on its own.

  Field population is action-specific:
  - lock   : htlcAddress, redeemScript, amountSats, timelock, network.
  - claim  : outpoint, redeemScript, preimage, network.
  - refund : outpoint, redeemScript, network.
  """
  type UnsignedBitcoinTx {
    """Lock only: P2WSH bech32 address the client must fund."""
    htlcAddress: String
    """Every action: HTLC redeem script (hex, no 0x) — witness input."""
    redeemScript: String!
    """Lock only: amount in satoshis (u64 as string for safe JSON)."""
    amountSats: String
    """Lock only: absolute unix timestamp the CLTV branch enforces."""
    timelock: Int
    """Every action: network label ('mainnet' | 'signet' | 'testnet')."""
    network: String!
    """Claim + refund: HTLC UTXO outpoint being spent ('<txid>:<vout>')."""
    outpoint: String
    """Claim only: SHA-256 preimage hex (no 0x) the witness reveals."""
    preimage: String
  }

  """Polling result for BTC lock-tx confirmation status. Returned by
  mcpGetConfirmStatus — EVM/Sui agents do not call this because their
  confirm fits inside the MCP request budget. States:

  - AWAITING_CONFIRMATION : txid submitted but not yet at required depth
                            (or no txid registered yet).
  - CONFIRMED             : tx confirmed at or past required depth.
  - FAILED                : tx not findable / rejected / reorged out.
  - EXPIRED               : trade timelock passed before confirmations
                            reached — caller should move to refund.
  """
  type BtcConfirmStatus {
    state: String!
    confirmationsObserved: Int!
    confirmationsRequired: Int!
    """Submitted funding-tx txid, or null if mcpSubmitLockTx not called yet."""
    txid: String
    """Block height at which the tx was included; null pre-confirmation."""
    blockHeight: Int
  }

