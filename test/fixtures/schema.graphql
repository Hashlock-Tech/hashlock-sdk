  """Solver instant-fill lifecycle record (migrations 115 + 117): exactly one
  per quote. State machine: committed -> fronted -> settled -> reimbursed,
  with committed -> cancelled as the terminal failure branch (accept failed /
  quote left its firm window). settled/reimbursed transitions are wired by
  the chain-watcher once the SolverVault is deployed (see
  docs/design/INSTANT-FILL-LIFECYCLE.md)."""
  type InstantFill {
    id: ID!
    quoteId: ID!
    """Trade materialised from the accepted quote; linked by acceptQuote.
    Null until the quote is accepted. Fronting can only be marked on a
    trade-linked fill (canonical-sequence guard)."""
    tradeId: ID
    """One of: committed, fronted, settled, reimbursed, cancelled."""
    state: String!
    """Committed fill amount in the asset's smallest on-chain unit
    (wei/sat/MIST) as a decimal string — full uint256 range."""
    amountWei: String!
    """EVM tx hash of the solver vault's fronting transfer; set when the
    solver marks the fill fronted."""
    frontTxHash: String
    """ISO timestamp of the committed -> fronted transition."""
    frontedAt: String
    createdAt: String!
  }

  type TradeRef {
