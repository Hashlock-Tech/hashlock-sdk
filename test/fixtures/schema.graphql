  type Mutation {
    createRFQ(baseToken: String!, quoteToken: String!, side: Side!, amount: String!, expiresIn: Int, isBlind: Boolean, chainId: Int, baseChain: String, quoteChain: String): RFQ!
    cancelRFQ(id: ID!): RFQ!
    submitQuote(rfqId: ID!, price: String!, amount: String!, expiresIn: Int, deliveryDelayHours: Int, collateralBtcSats: String, instantFill: Boolean, solverVaultAddr: String): Quote!
    """
    RFQ owner accepts a quote, creating a Trade. The optional policy arg
    (Faz 1.9 agent adapter) may additionally request the solver instant-fill
    path before the standard accept — see AgentPolicyInput. Omitting it keeps
    the historical behavior exactly.
    """
    acceptQuote(quoteId: ID!, policy: AgentPolicyInput): Quote!
    """
    Taker requests a solver instant fill on a firm instant-fill quote
    (Instant Settlement Faz 1.6, Lane A). Gated behind the instant_fill
    feature flag; routes through the settlement-core router and only
    proceeds when the intent classifies into Lane A. Exactly-once per
    quote (uq_instant_fills_quote).
    """
    requestInstantFill(rfqId: ID!, quoteId: ID!): InstantFill!
    """
    Solver marks its committed instant fill as fronted on-chain (instant-fill
    lifecycle). Caller must be the market maker behind the fill's quote.
    Requires the fill to be linked to a trade — i.e. the quote was accepted —
    so fronting can never run ahead of the canonical fill -> accept sequence.
    Atomic single-statement transition committed -> fronted; a second call
    409s instead of overwriting the recorded evidence. frontTxHash is the EVM
    tx hash of the vault's fronting transfer (recorded as evidence; on-chain
    verification lands with the SolverVault deploy).
    """
    markInstantFillFronted(fillId: ID!, frontTxHash: String!): InstantFill!
    """
    Create a trade directly from a 1-on-1 chat "Agreed" action.
    Skips the RFQ/Quote dance. The caller becomes the counterparty (acceptor),
    the original RFQ sender becomes the initiator. Returns a PROPOSED trade
    ready to enter the HTLC lifecycle.
    """
    confirmDirectTrade(counterpartyId: ID!, baseToken: String!, quoteToken: String!, side: Side!, baseAmount: String!, price: String!, chainId: String!, chainType: String, counterpartyChainType: String, counterpartyChainId: String, broadcastRfqId: ID, deliveryDelayHours: Int, collateralBtcSats: String, conversationId: ID): Trade!
    """
    Bulk-expire RFQs whose expires_at has passed. Sweeps all ACTIVE expired
    RFQs to status='EXPIRED' and cascades their PENDING quotes. Any
    authenticated user can trigger the sweep.
    """
    expireRFQs: ExpireRFQsResult!
    createBlindOrder(baseToken: String!, quoteToken: String!, side: Side!, amount: String!, minPrice: String, maxPrice: String): BlindOrder!
    cancelBlindOrder(id: ID!): BlindOrder!
    runBatchCrossing: BatchCrossingResult!
    acceptTrade(tradeId: ID!): Trade!
    cancelTrade(tradeId: ID!): Trade!
    fundHTLC(tradeId: ID!, txHash: String!, role: HTLCRole!, timelock: Int, hashlock: String, chainType: String, senderPubKey: String, receiverPubKey: String, redeemScript: String, refundTxHex: String, preimage: String): FundHTLCResult!
    claimHTLC(tradeId: ID!, txHash: String!, preimage: String!, chainType: String): HTLCStatusResult!
    refundHTLC(tradeId: ID!, txHash: String!, chainType: String): HTLCStatusResult!
    """
    Prepare a Bitcoin HTLC for a trade. Generates the redeem script and P2WSH
    address. The client funds this address, then calls fundHTLC with the txHash.
    """
    prepareBitcoinHTLC(tradeId: ID!, role: HTLCRole!, senderPubKey: String!, receiverPubKey: String!, timelock: Int!, amountSats: String!, hashlock: String): BitcoinHTLCPrepareResult!
    """
    Build an unsigned claim PSBT for a Bitcoin HTLC. Requires the preimage and
    the claimer's destination public key. Returns a PSBT for wallet signing.
    """
    buildBitcoinClaimPSBT(tradeId: ID!, htlcId: ID!, preimage: String!, destinationPubKey: String!, feeRate: Int): BitcoinClaimPSBTResult!
    """
    Broadcast a signed Bitcoin transaction to the network via Blockstream API.
    Accepts a fully signed raw transaction hex.
    """
    broadcastBitcoinTx(tradeId: ID!, txHex: String!): BitcoinBroadcastResult!
    """
    Confirm settlement wallets for a trade. Both parties must confirm before HTLC creation.
    Returns the updated trade with wallet confirmation timestamps.
    """
    confirmSettlementWallets(tradeId: ID!, sendWalletId: ID!, receiveWalletId: ID!): Trade!
    """Admin-only: update fee configuration for a specific trade type"""
    updateFeeConfig(input: UpdateFeeConfigInput!): FeeConfiguration!
    """Update RFQ watch preferences (opt-in to real-time RFQ broadcast)"""
    updateRFQWatchPreferences(enabled: Boolean!, pairs: [String!]): RFQWatchPreferences!
    """Internal: issue one-time key (called by mcp-gateway)"""
    issueMcpOtk(rfqId: ID, tradeId: ID, purpose: String!, ttlSeconds: Int!): McpOtkIssued!
    """MCP: commit hashlock to an RFQ"""
    mcpCommitHashlock(rfqId: ID!, hashlock: String!, signature: String!, otkToken: String!): McpConfirmResult!
    """MCP: commit HTLC parameters (hashlock/timelock/give amount/counterparty/token)
    directly onto a trade row. Used by the direct-trade path (confirmDirectTrade)
    where there is no RFQ. The RFQ path populates these fields from the RFQ
    row at acceptQuote time and does not call this mutation."""
    submitTradeHashlock(
      tradeId: ID!
      hashlock: String!
      timelock: Int!
      giveAmount: String!
      counterpartyAddress: String!
      tokenAddress: String
      signature: String!
      otkToken: String
    ): McpConfirmResult!
    """MCP: build unsigned lock tx for browser wallet. For walletType=safe,
    the result includes safeContext and the signUrl routes to the Safe sign
    page instead of the immediate broadcast page."""
    mcpBuildLockCalldata(tradeId: ID!, walletType: McpWalletType = eoa, safeAddress: String, chainType: String): McpBuildResult!
    """MCP: confirm lock tx was broadcast (EOA) OR a Safe proposal was
    submitted (multisig). Provide exactly one of txHash or safeTxHash."""
    mcpConfirmLock(tradeId: ID!, txHash: String, safeTxHash: String, otkToken: String!): McpConfirmResult!
    """MCP: build the counterparty mirror-lock calldata. Callable only by
    the trade's counterparty, only after status=INITIATOR_LOCKED. Derives
    the counterparty timelock as trade.timelock - 30 min. counterpartyAmount
    defaults to trade.give_amount for symmetric test swaps; pass an explicit
    wei value for real quote-side amounts. counterpartyTokenAddress is null
    for native asset."""
    mcpBuildCounterpartyLockCalldata(
      tradeId: ID!,
      counterpartyAmount: String,
      counterpartyTokenAddress: String,
    ): McpBuildResult!
    """MCP: confirm the counterparty's mirror-lock tx. Transitions the trade
    from INITIATOR_LOCKED to BOTH_LOCKED and inserts the counterparty HTLC
    row. counterpartyAmount/counterpartyTokenAddress MUST match what the
    caller passed to mcpBuildCounterpartyLockCalldata (validator uses them
    to re-check the on-chain tx)."""
    mcpConfirmCounterpartyLock(
      tradeId: ID!,
      txHash: String!,
      otkToken: String!,
      counterpartyAmount: String,
      counterpartyTokenAddress: String,
    ): McpConfirmResult!
    """MCP (Safe multisig): register a safeTxHash returned by the browser
    after posting the EIP-712 proposal to Safe Transaction Service.
    Flips the matching mcp_wallet_proposals row to AWAITING_APPROVAL."""
    mcpRegisterSafeTx(tradeId: ID!, purpose: String!, safeTxHash: String!, otkToken: String!): McpConfirmResult!
    """MCP: build claim calldata for browser wallet.
    preimage is required when trade.chain_type='sui' (PTB construction needs it).
    EVM agents ignore it and encode withdraw(contractId, preimage) client-side."""
    mcpBuildClaimCalldata(tradeId: ID!, preimage: String): McpBuildResult!
    """MCP: confirm claim tx was broadcast"""
    mcpConfirmClaim(tradeId: ID!, txHash: String!, otkToken: String!): McpConfirmResult!
    """MCP: build refund calldata for browser wallet"""
    mcpBuildRefundCalldata(tradeId: ID!): McpBuildResult!
    """MCP: confirm refund tx was broadcast"""
    mcpConfirmRefund(tradeId: ID!, txHash: String!, otkToken: String!): McpConfirmResult!
    """MCP (Bitcoin-only): register a pre-signed refund tx hex BEFORE broadcasting
    the funding tx. Persists onto htlcs.refund_tx_hex (inserts the initiator HTLC
    row if it does not exist yet). Required per .planning/MCP-BITCOIN-PLAN.md §3.2
    because a stranded funder cannot reclaim BTC without a pre-signed refund
    spend. Stored blindly — the agent only hurts itself by signing wrong."""
    mcpRegisterPreSignedRefund(tradeId: ID!, refundTxHex: String!, otkToken: String!): McpConfirmResult!
    """MCP (Bitcoin-only): submit the funding-tx txid the agent just broadcast.
    Backend does NOT relay the tx itself — the agent owns broadcasting per
    .planning/MCP-BITCOIN-PLAN.md §3.1. Persists the txid on the initiator
    HTLC row and returns state='AWAITING_CONFIRMATION'; caller polls
    mcpGetConfirmStatus until CONFIRMED. Requires mcpRegisterPreSignedRefund
    was called first."""
    mcpSubmitLockTx(tradeId: ID!, txid: String!, otkToken: String!): McpConfirmResult!
    """MCP (Bitcoin-only): poll the confirmation status of the submitted
    funding tx. Queries Esplora directly in C.2 (chain-watcher BTC
    subscriber lands in Phase C.3). Returns confirmationsObserved /
    confirmationsRequired and a state string — see BtcConfirmStatus."""
    mcpGetConfirmStatus(tradeId: ID!, otkToken: String): BtcConfirmStatus!
    """Register a webhook URL to receive new RFQ notifications"""
    registerRfqWebhook(url: String!): Boolean!
    """Unregister RFQ webhook"""
    unregisterRfqWebhook: Boolean!
  }

  type RFQWatchPreferences {
    enabled: Boolean!
    pairs: [String!]
  }

  # ============================================================
  # Compute asset class — types required by PR2.1a mutation
  # ============================================================
  # These types are duplicated from SUBSCRIPTION_SDL so that the
  # federated HTTP schema (built from typeDefs) can resolve
  # createComputeCapacityRfq when T6 wires the resolver.
  # SUBSCRIPTION_SDL retains its own copy for the graphql-ws server.

  enum AttestationState {
    MINTED
    LISTED
    SOLD
    ACTIVE
    SETTLED
    REFUNDED
  }

  type AttestationLeg {
    tradeId: ID!
    chainType: String!
    chainId: String
    """ComputeSettlement deployment address"""
    contractAddress: String!
    """ERC-1155 tokenId of the capacity batch (decimal string)"""
    tokenId: String!
    periodStart: String!
    periodEnd: String!
    """checkpoint sequence"""
    cpSeq: Int!
    state: AttestationState!
    cumUptimeBps: Int
    cumPerfBps: Int
    """65-byte hex when collected"""
    buyerSig: String
    providerSig: String
    monitorSigs: [String!]
    settleTxHash: String
    refundTxHash: String
    """EVM tx hash of the mint, filled by chain-watcher on TokenMinted observed"""
    mintTxHash: String
    """EVM tx hash of the buy, filled by chain-watcher on Bought observed"""
    boughtTxHash: String
    """EVM tx hash of ComputeSettlement.activate. NULL until chain-watcher observes Activated. PR2.3."""
    activatedTxHash: String
  }

  input CreateComputeCapacityRfqInput {
    chainId: Int!
    skuHash: String!
    regionCode: String!
    periodStart: String!
    periodEnd: String!
    disputeWindow: Int!
    termsHash: String!
    unitNotional: String!
    pAcceptBps: Int!
    providerSigner: String!
    monitorSigners: [String!]!
    monitorThreshold: Int!
    quoteToken: String!
  }

  type ComputeCapacityRfqPayload {
    trade: Trade!
    attestationLeg: AttestationLeg!
  }

  input AcceptComputeCapacityListingInput {
    """Decimal-string tokenId of the LISTED attestation_legs row"""
    tokenId: String!
    """0x... EVM address of the buyer (must own wallet per assertWalletBelongsToUser)"""
    buyerAddress: String!
    """65-byte hex signature (0x...) — backend stores opaquely, on-chain contract verifies"""
    buyerSignature: String!
  }

  type AcceptComputeCapacityListingPayload {
    trade: Trade!
    attestationLeg: AttestationLeg!
    """Operator-actionable next-step text"""
    buyInstruction: String!
  }

  extend type Mutation {
    createComputeCapacityRfq(input: CreateComputeCapacityRfqInput!): ComputeCapacityRfqPayload!
    acceptComputeCapacityListing(input: AcceptComputeCapacityListingInput!): AcceptComputeCapacityListingPayload!
  }
