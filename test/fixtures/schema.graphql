  """Declarative agent settlement policy (Instant Settlement Faz 1.9,
  DESIGN §13 — one engine, two adapters). The agent's policy and the human
  speed-slider presets are the SAME parameters. The policy is a PREFERENCE,
  not a commitment: a malformed policy, a closed instant_fill flag, or an
  unavailable instant lane silently degrade to the standard HTLC accept path
  (the decision is recorded on the TRADE_CREATED audit event). All fields
  optional."""
  input AgentPolicyInput {
    """Max settlement latency tolerated, in ms (integer >= 0). Values at or
    below the Instant preset threshold (3000ms) request the solver
    instant-fill path when the accepted quote carries an instant-fill
    commitment and the instant_fill feature flag is on."""
    maxLatencyMs: Int
    """Max fee in basis points (0-10000). Currently audit-recorded only —
    enforced once the risk-engine fee model (Faz 0.2) lands."""
    maxFeeBps: Int
    """Minimum solver trust/reputation score (0-100). Compared against the
    platform's solver reputation feed (stubbed at 50 until the reputation
    oracle integration). High values steer to the trustless pure-HTLC path."""
    minTrust: Int
  }

